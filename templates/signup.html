{% extends "base.html" %}
{% block title %}Sign Up — TableBell{% endblock %}
{% block content %}
<div class="navbar"><div class="navbar-inner">
  <a href="{{ url_for('landing') }}" class="brand">🔔 TableBell</a>
  <div class="nav-links"><a href="{{ url_for('login') }}" class="tab">Log in</a></div>
</div></div>
<div class="container" style="max-width: 460px; padding: 50px 20px;">
  <div class="card">
    <h2>Create your restaurant account</h2>
    <p class="muted" style="margin-top:-8px;">Free to start. Demo menu & tables included.</p>
    <form method="POST">
      <div class="field">
        <label>Restaurant Name</label>
        <input type="text" name="name" placeholder="e.g. Tony's Trattoria" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="owner@restaurant.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Choose a password" required>
      </div>
      <div class="field">
        <label>Plan</label>
        <select name="plan">
          <option value="starter">Starter — ${{ plan_prices.starter }}/mo (up to 10 tables)</option>
          <option value="growth">Growth — ${{ plan_prices.growth }}/mo (11–25 tables)</option>
          <option value="pro">Pro — ${{ plan_prices.pro }}/mo (25+ tables)</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
    </form>
    <p class="muted" style="font-size:13px; margin-top:16px;">
      Already have an account? <a href="{{ url_for('login') }}" style="color:var(--orange-dark); font-weight:700;">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
